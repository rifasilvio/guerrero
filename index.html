<style>
:root {
  --bg:          #F7F8FC;
  --surface:     #ffffff;
  --surface2:    #EEF0F8;
  --border:      #E2E5F0;
  --border2:     #C8CCDE;
  --accent:      #4F46E5;
  --accent2:     #3730A3;
  --sold:        #ffffff;
  --sold-bg:     #EF4444;
  --sold-text:   #ffffff;
  --sold-border: #DC2626;
  --free-text:   #64748B;
  --text:        #0F172A;
  --text-muted:  #64748B;
  --red:         #EF4444;
  --shadow:      0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:   0 4px 12px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:   0 10px 30px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --accent-light: #EEF2FF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text); min-height: 100vh;
}

/* LOADING */
#connecting {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #3730A3, #4F46E5);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; gap: 20px;
}
.spinner {
  width: 52px; height: 52px; border: 4px solid rgba(255,255,255,.25);
  border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#connecting p { color: rgba(255,255,255,.80); font-size: 15px; font-weight: 500; }
#connecting.hidden { display: none; }

/* CONFIG ERROR */
#config-error { display: none; position: fixed; inset: 0; background: var(--bg); align-items: center; justify-content: center; z-index: 999; padding: 24px; }
#config-error.show { display: flex; }
.error-box { background: var(--surface); border: 1px solid #fecaca; border-radius: 16px; padding: 28px; max-width: 480px; width: 100%; }
.error-box h2 { color: var(--red); font-size: 18px; margin-bottom: 10px; }
.error-box p  { color: var(--text-muted); font-size: 14px; line-height: 1.6; }

/* HERO */
.hero {
  background: linear-gradient(150deg, #1E1B4B 0%, #1A4F8A 50%, #1565C0 100%);
  padding: 32px 20px 28px; position: relative; overflow: hidden;
}
.hero::before {
  content:''; position: absolute; inset: 0;
  background: radial-gradient(circle at 80% 20%, rgba(255,255,255,.06) 0%, transparent 55%);
}
.hero::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, #A5B4FC, #818CF8, #A5B4FC, transparent);
}
.hero-inner { position: relative; max-width: 640px; margin: 0 auto; }
.hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.hero-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
  color: #A5B4FC; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.hero-eyebrow::after { content: ''; flex: 1; height: 1px; background: rgba(255,213,79,.3); }
.hero-title {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: clamp(20px,4.5vw,30px); font-weight: 900;
  color: #ffffff; line-height: 1.25; flex: 1;
}
.hero-title span { color: #A5B4FC; }
.hero-sub {
  font-size: 12px; color: rgba(255,255,255,.65);
  margin-top: 8px; display: flex; align-items: center; gap: 6px;
}
.live-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: blink 1.5s ease infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }


.hero-stats { display: flex; gap: 10px; margin-top: 20px; }
.hstat {
  flex: 1; background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.18);
  border-radius: 14px; padding: 12px 12px; text-align: center; backdrop-filter: blur(4px);
}
.hstat-val { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 28px; font-weight: 900; color: #ffffff; line-height: 1; }
.hstat-val.green { color: #6EE7B7; }
.hstat-val.muted { color: rgba(255,255,255,.45); }
.hstat-label { font-size: 10px; color: rgba(255,255,255,.55); margin-top: 4px; text-transform: uppercase; letter-spacing: .8px; }

.progress-track { background: rgba(255,255,255,.15); border-radius: 99px; height: 8px; overflow: hidden; margin-top: 16px; }
.progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #A5B4FC, #6EE7B7); transition: width .5s cubic-bezier(.4,0,.2,1); width: 0%; }
.progress-label { font-size: 11px; color: rgba(255,255,255,.50); margin-top: 6px; text-align: right; }

/* DATE BANNER */
.date-banner {
  background: #4F46E5;
  color: #fff; text-align: center; padding: 11px 20px;
  font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
}
.date-banner strong { color: #C7D2FE; }

/* PRIZES */
.prizes-wrap {
  max-width: 680px; margin: 0 auto; padding: 20px 16px 4px;
}
.prizes-heading {
  text-align: center; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 18px; color: var(--text); margin-bottom: 14px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.prizes-heading::before, .prizes-heading::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.prizes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:500px){ .prizes-grid { grid-template-columns: 1fr; } }
.prize-card {
  border-radius: 16px; padding: 18px 16px; position: relative; overflow: hidden;
  box-shadow: var(--shadow-md);
}
.prize-card.gold {
  background: #FAFAFA;
  border: 2px solid #4F46E5;
}
.prize-card.silver {
  background: #FAFAFA;
  border: 2px solid #9CA3AF;
}
.prize-tag {
  font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 99px; display: inline-block; margin-bottom: 10px;
}
.gold .prize-tag { background: #4F46E5; color: #fff; }
.silver .prize-tag { background: #64748B; color: #fff; }
.prize-icon { font-size: 30px; display: block; margin-bottom: 8px; }
.prize-name {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 15px; font-weight: 700;
  color: var(--text); line-height: 1.35;
}
.prize-detail { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

/* PRICING */
.pricing-wrap {
  max-width: 680px; margin: 0 auto; padding: 4px 16px 16px;
}
.pricing-heading {
  text-align: center; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
}
.pricing-heading::before, .pricing-heading::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media(max-width:480px){ .pricing-grid { grid-template-columns: 1fr; gap: 6px; } }
.price-card {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 14px; padding: 14px 12px; text-align: center;
  box-shadow: var(--shadow); position: relative; transition: border-color .2s;
}
.price-card.best {
  border-color: #4F46E5;
  background: #EEF2FF;
}
.price-best-label {
  display: none; position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
  background: #4F46E5; color: #fff; font-size: 10px; font-weight: 800;
  letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 10px; border-radius: 99px;
  white-space: nowrap;
}
.price-card.best .price-best-label { display: block; }
.price-qty {
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
}
.price-amount {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 22px; font-weight: 700;
  color: var(--text); line-height: 1;
}
.price-card.best .price-amount { color: #4F46E5; }
.price-unit { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.controls-wrap {
  background: rgba(255,255,255,.95); border-bottom: 1px solid var(--border);
  padding: 12px 16px; position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,.07); backdrop-filter: blur(8px);
}
.controls { display: flex; gap: 8px; flex-wrap: wrap; }
.search-box {
  flex: 1; min-width: 140px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 9px 14px; color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; outline: none; transition: border-color .2s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--free-text); }
.filter-btn {
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 9px 14px; color: var(--text-muted); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

/* LEGEND */
.legend { padding: 10px 16px 4px; display: none; flex-wrap: wrap; gap: 6px; max-width: 640px; margin: 0 auto; }
.legend.show { display: flex; }
.legend-item {
  display: flex; align-items: center; gap: 6px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 99px; padding: 5px 12px;
  font-size: 12px; color: var(--text-muted); font-weight: 500;
}
.legend-btn { cursor: pointer; transition: all .2s; }
.legend-btn:hover { border-color: var(--accent); color: var(--accent); }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* Seller summary panel */
.seller-panel {
  max-width: 680px; margin: 8px auto 0; padding: 0 16px;
}
.seller-panel-header {
  background: var(--surface); border: 1.5px solid var(--border2);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: var(--shadow-md);
}
.seller-panel-name {
  font-size: 15px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.seller-panel-name::before {
  content: ''; width: 10px; height: 10px; border-radius: 50%;
  background: var(--seller-color, var(--accent)); flex-shrink: 0;
}
.seller-panel-stats {
  display: flex; align-items: center; gap: 10px;
}
.sp-stat { text-align: center; min-width: 52px; }
.sp-val {
  display: block; font-size: 20px; font-weight: 800; line-height: 1; color: var(--text);
}
.sp-label {
  display: block; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); margin-top: 2px;
}
.sp-stat-pagado .sp-val   { color: #10B981; }
.sp-stat-pendiente .sp-val { color: #F59E0B; }
.sp-divider { width: 1px; height: 32px; background: var(--border); }
.sp-btn {
  background: #FFFBEB; border: 1.5px solid #FCD34D;
  border-radius: 10px; padding: 6px 10px;
  cursor: pointer; transition: all .18s;
}
.sp-btn:hover { background: #FEF3C7; border-color: #F59E0B; }
.sp-btn.open  { background: #FEF3C7; border-color: #F59E0B; }
.sp-list {
  background: var(--surface); border: 1.5px solid #FCD34D;
  border-top: none; border-radius: 0 0 14px 14px;
  padding: 12px 14px; margin-top: -4px;
  animation: slideDown .2s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.sp-list-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: #92400E; margin-bottom: 10px;
}
.sp-list-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 9px; margin-bottom: 5px;
  background: var(--surface2); border: 1px solid var(--border);
}
.sp-list-item:last-child { margin-bottom: 0; }
.sp-num {
  font-size: 17px; font-weight: 800; color: var(--text); min-width: 34px;
}
.sp-nombre { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.sp-pendiente-badge {
  background: #FFFBEB; border: 1px solid #FCD34D; color: #92400E;
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px;
}

/* Payment legend */
.pay-legend {
  padding: 6px 16px 4px; display: flex; gap: 8px; max-width: 680px; margin: 0 auto;
}
.pay-legend-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 99px; padding: 5px 13px; cursor: pointer;
  transition: all .18s; font-family: 'Inter', sans-serif;
}
.pay-legend-btn:hover { border-color: var(--border2); color: var(--text); }
.pay-legend-btn.active-pagado    { background: #ECFDF5; border-color: #10B981; color: #065F46; }
.pay-legend-btn.active-pendiente { background: #FFFBEB; border-color: #F59E0B; color: #92400E; }
.grid-wrap { padding: 16px; max-width: 680px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(56px,1fr)); gap: 7px; }
.ticket {
  aspect-ratio: 1; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--free-text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 15px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s ease; position: relative; user-select: none;
  box-shadow: var(--shadow);
}
.ticket:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.07); box-shadow: var(--shadow-md); z-index: 2; }
.ticket.sold {
  background: #EF4444;
  border-color: #DC2626;
  color: #ffffff;
  cursor: default;
}
.ticket.sold:hover { transform: none; box-shadow: var(--shadow); border-color: #DC2626; color: #fff; }
.ticket.sold::after { content: '✓'; position: absolute; top: 3px; right: 5px; font-size: 9px; color: rgba(255,255,255,.7); font-weight: 700; }
.ticket .seller-dot { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; }
/* Admin: seller color override */
.ticket.sold.seller-colored { color: #fff; border-color: transparent; }
/* Payment status icon */
.ticket .pay-icon {
  position: absolute; bottom: 3px; right: 4px;
  font-size: 10px; line-height: 1; pointer-events: none;
}
.ticket.hidden { display: none; }
.empty { text-align: center; padding: 48px 20px; color: var(--text-muted); display: none; font-size: 14px; }
.empty.show { display: block; }

/* MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(15,23,42,.5);
  z-index: 200; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(8px);
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 22px; width: 100%; max-width: 400px; padding: 28px;
  box-shadow: var(--shadow-lg); animation: slideUp .25s cubic-bezier(.34,1.4,.64,1);
}
@keyframes slideUp { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-num-wrap { text-align: center; margin-bottom: 4px; }
.modal-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 80px; height: 80px; border-radius: 20px;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 34px; font-weight: 700;
  background: #EEF2FF; color: var(--accent); border: 2px solid #A5B4FC;
}
.modal-num.sold-style { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }
.modal-subtitle {
  text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted);
  margin-top: 8px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1.2px;
}

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 5px; }
.field input, .field select {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 10px 14px; color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 15px; outline: none; transition: border-color .2s; appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--accent); }

.modal-sold-info { background: #FEF2F2; border: 1.5px solid #FECACA; border-radius: 14px; padding: 14px; margin-bottom: 4px; }
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,.05); }
.info-row:last-child { border: none; padding-bottom: 0; }
.info-label { color: var(--text-muted); font-size: 12px; font-weight: 500; }
.info-val { color: var(--text); font-weight: 600; font-size: 14px; }

.pago-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }
.pago-pagado   { background: #ECFDF5; color: #065F46; border: 1px solid #6EE7B7; }
.pago-pendiente { background: #FFFBEB; color: #92400E; border: 1px solid #FCD34D; }

.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn { flex: 1; padding: 12px; border-radius: 11px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
.btn-cancel { background: var(--surface2); color: var(--text-muted); border: 1.5px solid var(--border); }
.btn-cancel:hover { color: var(--text); border-color: var(--border2); }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,.35); }
.btn-primary:hover { opacity: .9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-danger { background: #fef2f2; color: var(--red); border: 1.5px solid #fecaca; flex: 0 0 auto; padding: 12px 14px; }
.btn-danger:hover { background: #fee2e2; }
.btn-edit { background: #EEF2FF; color: #3730A3; border: 1.5px solid #A5B4FC; font-size: 13px; }
.btn-edit:hover { background: #E0E7FF; }
.btn-wa {
  flex: 1; padding: 12px; border-radius: 11px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s;
  background: #25d366; color: #fff;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  text-decoration: none; box-shadow: 0 2px 8px rgba(37,211,102,.3);
}
.btn-wa:hover { background: #1ebe5d; transform: translateY(-1px); }

/* LOGIN */
#login-modal-bg { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.6); z-index: 500; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(8px); }
#login-modal-bg.open { display: flex; }
.login-box { background: var(--surface); border: 1.5px solid
